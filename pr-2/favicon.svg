<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @font-face {
        font-family: 'Inter';
        src: url('https://fonts.googleapis.com/css2?family=Inter:wght@700');
      }
    </style>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8FF00" />
      <stop offset="100%" stop-color="#6B8A00" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3" />
  <!-- Monogram text -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="url(#accentGradient)" letter-spacing="-2">SS</text>
</svg>
